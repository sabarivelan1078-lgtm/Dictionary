name: Android APK Auto-Compiler CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    name: Build & Package Debug APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up JDK 17 Development Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Grant Execute Permission to Gradle Wrapper
        run: chmod +x ./gradlew
        continue-on-error: true

      - name: Assemble Debug APK with Gradle Kotlin DSL
        run: ./gradlew assembleDebug

      - name: Archive Compiled APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bilingual-dictionary-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
